name: Docker Smoke Test

on:
  pull_request_target:

jobs:
  docker-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > ${HOME}/gcloud-service-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${HOME}/gcloud-service-key.json" >> $GITHUB_ENV

      - name: Build PR image
        run: docker build -t otter-service:pr .

      - name: Start otter-service
        run: |
          docker run -d --name otter-pr -p 10101:10101 \
            -v ${HOME}/gcloud-service-key.json:/tmp/sa-key.json \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json \
            -e GCP_PROJECT_ID=${{ secrets.GCP_PROJECT }} \
            -e ENVIRONMENT=otter-ci-${{ github.run_id }} \
            -e LOG_LEVEL=INFO \
            otter-service:pr

      - name: Wait for service to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:10101/services/otter_grade/ 2>/dev/null; then
              echo "Service ready"
              exit 0
            fi
            echo "Attempt $i: waiting for service..."
            sleep 2
          done
          echo "Service failed to start"
          docker logs otter-pr
          exit 1

      # Verify the POST endpoint is alive. We don't send a real notebook
      # payload — `{"notebook":"test"}` is intentionally garbage and the
      # service will (correctly) return 500. The point of this step is to
      # confirm the POST handler is reachable and returns *some* HTTP
      # response, not that grading works with arbitrary input. `-f` is
      # dropped so 5xx responses aren't treated as curl failures. Real
      # end-to-end grading is tested in edx-hub's smoke-test job, which
      # submits properly-shaped notebooks through KEDA.
      - name: Verify service responds
        run: |
          STATUS=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST http://localhost:10101/services/otter_grade/ \
            -H "Content-Type: application/json" \
            -d '{"notebook": "test"}')
          echo "HTTP Status: ${STATUS}"
          echo "Body:"; cat /tmp/body; echo
          if ! [[ "${STATUS}" =~ ^[0-9]{3}$ ]]; then
            echo "Service did not return an HTTP response (status: '${STATUS}')"
            exit 1
          fi

      - name: Clean up Firestore CI collections
        if: always()
        run: |
          pip install google-cloud-firestore -q
          python3 - <<'EOF'
          import os
          from google.cloud import firestore

          run_id = "${{ github.run_id }}"
          db = firestore.Client(project=os.environ["GCP_PROJECT_ID"])
          for suffix in ["grades", "logs", "tornado-logs", "submissions"]:
              coll = db.collection(f"otter-ci-{run_id}-{suffix}")
              docs = coll.get()
              for doc in docs:
                  doc.reference.delete()
              if docs:
                  print(f"deleted {len(docs)} docs from otter-ci-{run_id}-{suffix}")
          EOF
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "${{ job.status == 'success' && '✅' || '❌' }} otter-service smoke test ${{ job.status }} — ${{ github.head_ref }} · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
