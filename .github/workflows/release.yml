name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@main
        with:
          configuration: 'release-changelog-builder-config.json'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          pip install build
          python3 -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/75088546496/locations/global/workloadIdentityPools/otter-pool/providers/github-actions'
          service_account: 'otter-sa@data8x-scratch.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --substitutions=_TAG_NAME=${{ github.ref_name }} \
            --config ./cloudbuild.yaml

  update-edx-hub:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.EDX_IMAGE_BUILDER_APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY_SECRET }}
          owner: edx-berkeley

      - name: Checkout edx-hub
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: edx-berkeley/edx-hub
          sparse-checkout: otter-service/

      - name: Set git identity
        run: |
          git config --global user.email "otter-service-bot[bot]@users.noreply.github.com"
          git config --global user.name "otter-service-bot[bot]"

      - name: Update otter-srv image tag
        run: |
          sed -i "/^otter_srv:/,/^[^ ]/ s/    tag:.*/    tag: ${{ github.ref_name }}/" otter-service/values.yaml
          echo "Updated otter_srv.tag to ${{ github.ref_name }}"
          grep "tag:" otter-service/values.yaml

      - name: Open PR to edx-hub
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="update-otter-srv-tag-${{ github.ref_name }}"
          MESSAGE="update otter-srv image tag to ${{ github.ref_name }}"
          git checkout -b ${BRANCH}
          git add otter-service/values.yaml
          git commit -m "${MESSAGE}"
          git push origin ${BRANCH}
          gh pr create -t "${MESSAGE}" -b "${MESSAGE}" -H ${BRANCH} -B staging \
            -R edx-berkeley/edx-hub